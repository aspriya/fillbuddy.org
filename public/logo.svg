<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- "PDF" text written by the pen — bold, slightly tilted -->
  <text
    x="55" y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-style="italic"
    font-size="200"
    fill="white"
    opacity="0.95"
    transform="rotate(-8, 170, 310)"
    letter-spacing="-4"
  >PDF</text>
  <!-- Underline stroke from pen -->
  <line x1="35" y1="385" x2="315" y2="345" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <!-- Pen body — angled from bottom-left to top-right -->
  <g transform="translate(280, 138) rotate(40) scale(1.35)">
    <!-- Pen barrel -->
    <rect x="-20" y="-160" width="40" height="200" rx="4" fill="#1a1a1a"/>
    <!-- Pen grip section -->
    <rect x="-22" y="20" width="44" height="40" rx="3" fill="#292929"/>
    <!-- Grip rings -->
    <line x1="-22" y1="30" x2="22" y2="30" stroke="#444" stroke-width="2"/>
    <line x1="-22" y1="38" x2="22" y2="38" stroke="#444" stroke-width="2"/>
    <line x1="-22" y1="46" x2="22" y2="46" stroke="#444" stroke-width="2"/>
    <!-- Pen tip (nib) -->
    <polygon points="-16,60 16,60 0,105" fill="#1a1a1a"/>
    <!-- Metal nib tip -->
    <polygon points="-8,80 8,80 0,105" fill="#666"/>
    <!-- Nib point -->
    <polygon points="-3,95 3,95 0,108" fill="#333"/>
    <!-- Pen cap top -->
    <rect x="-20" y="-170" width="40" height="18" rx="4" fill="#333"/>
    <!-- Clip on pen -->
    <rect x="18" y="-168" width="6" height="70" rx="3" fill="#444"/>
    <circle cx="21" cy="-100" r="5" fill="#555"/>
  </g>
</svg>
